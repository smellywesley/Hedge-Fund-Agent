# Terminal Alpha — local development stack
# Phase 1: web + api run on mock data. postgres/redis are provisioned for Phase 2
# but nothing connects to them yet.
services:
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  api:
    build: ./apps/api
    ports:
      - "8000:8000"

  # ponytail: unused in Phase 1, wired in Phase 2 (persistence)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: terminal
      POSTGRES_PASSWORD: terminal
      POSTGRES_DB: terminal_alpha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
